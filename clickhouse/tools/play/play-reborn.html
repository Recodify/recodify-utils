        .navigator-context-menu button[disabled]
        {
            opacity: 0.5;
            cursor: default;
        }

        .navigator-menu-icon
        {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--navigator-muted-color);
            font-size: 0.9rem;
        }

        .navigator-menu-label
        {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .navigator-footer
        {
            margin-top: auto;
            border-top: 1px solid var(--navigator-panel-border);
            padding-top: 0.45rem;
            display: grid;
            gap: 0.15rem;
            color: var(--navigator-muted-color);
            font-size: 0.78rem;
        }

        .navigator-footer-primary
        {
            color: var(--navigator-text-color);
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .navigator-footer-status
        {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            min-width: 0;
        }

        .navigator-footer-status-text
        {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #sidebar-resizer
        {
            position: absolute;
            top: 0;
            right: -0.25rem;
            bottom: 0;
            width: 0.55rem;
            cursor: col-resize;
            z-index: 20;
        }

        #sidebar-resizer::before
        {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            transform: translateX(-50%);
            background: var(--border-color);
            opacity: 0.65;
        }

        body.sidebar-resizing #sidebar-resizer::before,
        #sidebar-resizer:hover::before
        {
            opacity: 1;
            background: var(--misc-text-color);
        }

        #controls
        {
            /* When a page will be scrolled horizontally due to large table size, keep controls in place. */
            position: sticky;
            left: 0;
        }

        .active-connection-banner
        {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 0.35rem 0.75rem;
            align-items: center;
            margin-bottom: 0.5rem;
            padding: 0.55rem 0.75rem;
            border: 1px solid var(--navigator-card-border);
            background: var(--navigator-card-header-active);
        }

        .active-connection-label
        {
            color: var(--misc-text-color);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .active-connection-summary
        {
            min-width: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem 0.75rem;
            align-items: baseline;
        }

        .active-connection-name
        {
            flex: 0 1 auto;
            min-width: 0;
            font-size: 0.98rem;
            font-weight: 700;
        }

        .active-connection-meta
        {
            flex: 1 1 18rem;
            min-width: 0;
            color: var(--misc-text-color);
            font-size: 0.84rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Otherwise Webkit based browsers will display ugly border on focus. */
        textarea, input, button
        {
            outline: none;
            border: none;
            color: var(--text-color);
        }

        .monospace
        {
            /* Prefer fonts that have full hinting info. This is important for non-retina displays.
               Also I personally dislike "Ubuntu" font due to the similarity of 'r' and 'г' (it looks very ignorant). */
            font-family: DejaVu Sans Mono, Liberation Mono, MonoLisa, Consolas, monospace;
        }

        .shadow
        {
            box-shadow: 0 0 1rem var(--shadow-color);
        }

        input, textarea
        {
            border: 1px solid var(--border-color);
            /* The font must be not too small (to be inclusive) and not too large (it's less practical and make general feel of insecurity) */
            font-size: 11pt;
            padding: 0.25rem;
            background-color: var(--element-background-color);
        }

        input:focus, textarea:focus
        {
            color: var(--text-color-active);
        }

        #query
        {
            display: block;
            /* Make enough space for even big queries. */
            height: 20vh;
            /* Keeps query text-area's width full screen even when user adjusting the width of the query box. */
            width: 100%;
            min-width: 100%;
            max-width: 100%;
            margin-top: -1px; /* To compensate the border. */
            contain: strict; /* Less input lag even if the table is large. */
            resize: none; /* Disable default browser resizer */
        }

        #inputs
        {
            white-space: nowrap;
        }

        #url
        {
            width: 70%;
        }

        #user, #password
        {
            width: calc(15% + 1px);
            margin-left: -1px;
        }

        input.ok
        {
            color: var(--element-color-ok);
        }

        input.fail
        {
            background-color: var(--element-background-color-fail);
        }

        #run_div
        {
            margin-top: 0.5rem;
            display: grid;
            place-items: center;
            gap: 1rem;
            grid-template-columns: auto auto auto 1fr auto auto auto;
            grid-template-areas: "run hint hourglass progress-bar download progress-text theme";
        }

        #run
        {
            grid-area: run;
            user-select: none;
            color: var(--button-text-color);
            background-color: var(--button-color);
            padding: 0.25rem 1rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 100%; /* Otherwise button element will have a lower font size. */
        }

        #run:hover, #run:focus, #download-div:hover, #download-div:focus
        {
            color: var(--button-active-text-color);
            background-color: var(--button-active-color);
        }

        #hint
        {
            grid-area: hint;
            color: var(--misc-text-color);
        }

        #hourglass
        {
            grid-area: hourglass;
            display: none;
            font-size: 110%;
            color: #888;
            animation: hourglass-animation 2s linear infinite;
        }

        #check-mark
        {
            grid-area: hourglass;
            display: none;
            font-size: 110%;
            color: #080;
        }

        #stats
        {
            grid-area: progress-text;
            color: var(--misc-text-color);
        }

        #stats b
        {
            color: var(--progress-color);
        }

        #download-div
        {
            grid-area: download;
            display: none;
            user-select: none;
            color: var(--button-text-color);
            background-color: var(--button-color);
            padding: 0.25rem 0.65rem;
            cursor: pointer;
            position: relative;
        }

        #download
        {
            width: 1em;
            height: 1em;
        }

        #download-dropdown
        {
            display: none;
            position: absolute;
            background-color: var(--button-color);
            border: 1px solid var(--button-text-color);
            padding: 0.5rem;
            z-index: 999;
            box-shadow: 0 4px 6px var(--shadow-color);
        }

        #download-dropdown.show
        {
            display: block;
        }

        .download-option
        {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .download-option label
        {
            color: var(--button-text-color);
            white-space: nowrap;
            margin-right: 0.5rem;
        }

        .download-option.checkbox
        {
            align-items: flex-start;
        }

        .download-option.checkbox label
        {
            margin-right: 0;
            display: flex;
            align-items: flex-start;
            gap: 0.4rem;
            white-space: normal;
            line-height: 1.3;
        }

        .download-option.checkbox input
        {
            margin-top: 0.15rem;
        }

        .download-section-title
        {
            color: var(--button-text-color);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin: 0.35rem 0 0.25rem;
        }

        .download-option-help
        {
            display: block;
            opacity: 0.8;
            font-size: 0.72rem;
            line-height: 1.3;
            margin-top: 0.1rem;
        }

        .download-option select,
        #download-format-other
        {
            flex: 1;
            padding: 0.25rem;
            background-color: var(--element-background-color);
            color: var(--text-color);
            border: 1px solid var(--shadow-color);

            &:focus {
                outline: none;
            }
        }

        #download-format-other
        {
            display: none;
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
        }

        #download-format-other.show
        {
            display: block;
        }

        #download-button
        {
            width: 100%;
            margin-top: 0rem;
            padding: 0.5rem 0.5rem;
            background-color: var(--element-background-color);
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-weight: bold;

            &:hover {
                background-color: var(--button-active-color);
                color: var(--button-active-text-color);
            }
        }

        #progress
        {
            display: none;
            width: 100%;
            color: var(--misc-text-color);

            grid-area: progress-bar;
            background: linear-gradient(to right,
                transparent 0%,
                var(--progress-color) var(--progress),
                transparent var(--progress));
        }

        #theme
        {
            grid-area: theme;
        }

        #toggle-light, #toggle-dark
        {
            cursor: pointer;
            user-select: none;
        }

        [data-theme="light"] #toggle-light, [data-theme="dark"] #toggle-dark
        {
            display: none;
        }

        #results_tabs
        {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-top: 1rem;
        }

        #results_tabs:empty
        {
            display: none;
        }

        .result-tab
        {
            border: 1px solid var(--border-color);
            background: var(--table-header-color);
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            max-width: 16rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-tab.active
        {
            background: var(--button-color);
            color: var(--button-text-color);
        }

        #results_panels
        {
            margin-top: 0.5rem;
        }

        .result-panel
        {
            display: none;
        }

        .result-panel.active
        {
            display: block;
        }

        .result-summary
        {
            color: var(--misc-text-color);
            margin-bottom: 0.5rem;
        }

        .result-query
        {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #action_history
        {
            display: none;
            margin-top: 1rem;
        }

        #action_history_header
        {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        #action_history_header button
        {
            border: 1px solid var(--border-color);
            background: var(--element-background-color);
            color: var(--text-color);
            padding: 0.2rem 0.4rem;
        }

        #action-table
        {
            width: 100%;
        }

        #data_div, .data-div
        {
            margin-top: 1rem;
            background-color: var(--element-background-color);
        }

        #data_div.fixed, .data-div.fixed
        {
            width: fit-content;
        }

        #data-table, .data-table
        {
            width: 100%;
            border-spacing: 0;
            background-color: var(--element-background-color);
            border-collapse: collapse;
        }

        #data-table.fixed, .data-table.fixed
        {
            table-layout: fixed;
            width: var(--table-width);
         }

        /* Will be displayed when user specified custom format. */
        #data-unparsed, .data-unparsed
        {
            width: fit-content;
            background-color: var(--element-background-color);
            margin-top: 0rem;
            padding: 0.25rem 0.5rem;
            display: none;
        }

        td
        {
            background-color: var(--element-background-color);
            /* For wide tables any individual column will be no more than 50% of page width. */
            max-width: 50vw;
            /* The content is cut unless you hover. */
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border-color);
            white-space: pre;
            vertical-align: top;
        }

        td u
        {
            text-decoration-color: var(--misc-text-color);
        }

        .right
        {
            text-align: right;
        }

        th
        {
            position: sticky;
            top: -0.5rem;
            padding: 0.25rem 0.5rem;
            text-align: center;
            background-color: var(--table-header-color);
            border: 1px solid var(--border-color);
        }

        th .name {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .type-hint
        {
            display: none;
            position: absolute;
            user-select: none;
            left: 0;
            top: -1px;
            transform: translateY(-100%);
            font-size: 75%;
            font-weight: normal;
            color: var(--misc-text-color);
            background: var(--element-background-color);
            max-height: 5em;
            white-space: pre;
        }

        th:hover .type-hint
        {
            display: inline-block;
        }

        .resizer {
            position: absolute;
            top: 0;
            right: -0.3rem;
            width: 0.5rem;
            cursor: col-resize;
            user-select: none;
            height: 100%;
        }

        .resizer:hover, .resizer-dragging
        {
            border-radius: 0.25rem;
            background-color: var(--border-color-selected);
        }

        .textarea-resizer {
            position: absolute;
            bottom: -0.3rem;
            left: 0;
            width: 100%;
            height: 0.5rem;
            cursor: row-resize;
            user-select: none;
        }

        .textarea-resizer:hover, .textarea-resizer-dragging
        {
            border-radius: 0.25rem;
            background-color: var(--border-color);
        }

        #query_div {
            position: relative;
        }

        /* The row under mouse pointer is highlight for better legibility. */
        tr:hover
        {
            filter: var(--table-hover-filter);
        }

        .tr-selected
        {
            filter: var(--table-hover-filter);
        }

        #error, .error-output
        {
            background: var(--error-color);
            white-space: pre-wrap;
            padding: 0.5rem 1rem;
            display: none;
        }

        .td-selected
        {
            white-space: pre-wrap;
            max-width: none;
            outline: 2px solid var(--border-color-selected);
            outline-offset: -2px;
        }

        td.empty-result
        {
            text-align: center;
            vertical-align: middle;
        }

        .row-number
        {
            width: 1%;
            text-align: right;
            background-color: var(--table-header-color);
            color: var(--misc-text-color);
        }

        div.empty-result
        {
            opacity: 10%;
            font-size: 7vw;
            font-family: Liberation Sans, DejaVu Sans, sans-serif;
        }

        @keyframes hourglass-animation {
            0% { transform: none; }
            25% { transform: rotate(180deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(360deg); }
            100% { transform: rotate(360deg); }
        }

        a, a:visited
        {
            color: var(--link-color);
            text-decoration: none;
        }

        #graph, .graph-output
        {
            display: none;
            margin: auto;
        }

        /* This is for graph in svg */
        text
        {
            font-size: 14px;
            fill: var(--text-color);
        }

        .node rect
        {
            fill: var(--element-background-color);
            filter: drop-shadow(.2rem .2rem .2rem var(--shadow-color));
            stroke: var(--border-color);
        }

        .edgePath path
        {
            stroke: var(--text-color);
        }

        marker
        {
            fill: var(--text-color);
        }

        #logo
        {
            fill: var(--logo-color);
        }

        #cloud-logo
        {
            color: transparent;
            text-shadow: 0 0 0 var(--logo-color);
            font-size: 10vw;
            display: block;
        }

        #logo-container
        {
            text-align: center;
            margin-top: 5em;
            line-height: 0.75;
            position: sticky;
            left: 0;
        }

        #chart, .chart-output
        {
            border: 1px solid var(--border-color);
            background-color: var(--element-background-color);
            filter: drop-shadow(.2rem .2rem .2rem var(--shadow-color));
            display: none;
            height: 70vh;
        }

        #url_status
        {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            user-select: none;
            color: var(--navigator-muted-color);
        }

        #url_status.ok
        {
            color: var(--element-color-ok);
        }

        #url_status.fail
        {
            color: #F66;
        }

        #server_info
        {
            color: inherit;
        }

        /* Prevents a different color when Chromium auto-fills inputs from the list. */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active
        {
            transition: background-color 600000s 0s, color 600000s 0s;
        }

        /* This is for charts (uPlot), Copyright (c) 2022 Leon Sorokin, MIT License, https://github.com/leeoniya/uPlot/ */
        .u-wrap {position: relative;user-select: none;}
        .u-over, .u-under, .u-axis {position: absolute;}
        .u-under {overflow: hidden;}
        .uplot canvas {display: block;position: relative;width: 100%;height: 100%;}
        .u-legend {font-family: Liberation Mono, DejaVu Sans Mono, MonoLisa, Consolas, monospace; border-spacing: 0; border-collapse: collapse;}
        .u-inline {display: block;}
        .u-inline * {display: inline-block;}
        .u-legend th {font-weight: 600;}
        .u-legend th > * {vertical-align: middle;display: inline-block;}
        .u-legend td { min-width: 13em; }
        .u-legend .u-marker {width: 1em;height: 1em;margin-right: 4px;background-clip: padding-box !important;}
        .u-inline.u-live th::after {content: ":";vertical-align: middle;}
        .u-inline:not(.u-live) .u-value {display: none;}
        .u-series > * {padding: 4px;}
        .u-series th {cursor: pointer;}
        .u-legend .u-off > * {opacity: 0.3;}
        .u-select {background: rgba(0,0,0,0.07);position: absolute;pointer-events: none;}
        .u-cursor-x, .u-cursor-y {position: absolute;left: 0;top: 0;pointer-events: none;will-change: transform;z-index: 100;}
        .u-hz .u-cursor-x, .u-vt .u-cursor-y {height: 100%;border-right: 1px dashed #607D8B;}
        .u-hz .u-cursor-y, .u-vt .u-cursor-x {width: 100%;border-bottom: 1px dashed #607D8B;}
        .u-cursor-pt {position: absolute;top: 0;left: 0;border-radius: 50%;border: 0 solid;pointer-events: none;will-change: transform;z-index: 100;/*this has to be !important since we set inline "background" shorthand */background-clip: padding-box !important;}
        .u-axis.u-off, .u-select.u-off, .u-cursor-x.u-off, .u-cursor-y.u-off, .u-cursor-pt.u-off {display: none;}
    </style>
</head>

function setDownloadQueryCachePreference(enabled, persist = true) {
    download_use_cache_elem.checked = enabled;
    if (persist) {
        window.localStorage.setItem(download_query_cache_key, enabled ? '1' : '0');

function setNavigatorTypesVisible(enabled, persist = true) {
    navigator_show_types_elem.checked = enabled;
    databases_elem.classList.toggle('show-types', enabled);
    if (persist) {
        window.localStorage.setItem(navigator_show_types_key, enabled ? '1' : '0');

function setSidebarWidth(width, persist = true) {
    const bounded_width = Math.max(280, Math.min(720, Math.round(width)));
    document.body.style.setProperty('--sidebar-width', `${bounded_width}px`);

        window.localStorage.setItem(sidebar_width_key, String(bounded_width));

        replaced_pass.delete('password');
        window.history.replaceState(null, '',
            window.location.origin + window.location.pathname + '?'
            + replaced_pass.toString() + window.location.hash);
    }
}

function createConnectionId() {
    return `connection-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
}

function createConnection(name) {
    return {
        id: createConnectionId(),
        name: name || `Connection ${getSavedConnections().length + 1}`,
        url: url_elem.value || 'http://localhost:8123/',
        user: user_elem.value || 'default',
        password: password_elem.value || ''
    };
}

function getSavedConnections() {
    try {
        const connections = JSON.parse(window.localStorage.getItem(saved_connections_key) || '[]');
        return Array.isArray(connections) ? connections : [];
    } catch (e) {
        return [];
    }
}

function saveConnections(connections) {
    window.localStorage.setItem(saved_connections_key, JSON.stringify(connections));
}

function loadNavigatorState() {
    try {
        const stored = JSON.parse(window.localStorage.getItem(navigator_state_key) || '{}');
        return {
            connections: stored && typeof stored.connections == 'object' ? stored.connections : {},
            databases: stored && typeof stored.databases == 'object' ? stored.databases : {},
            groups: stored && typeof stored.groups == 'object' ? stored.groups : {},
            // Keep table nodes collapsed on load rather than restoring prior expansion state.
            tables: {}
        };
    } catch (e) {
        return { connections: {}, databases: {}, groups: {}, tables: {} };
    }
}

function saveNavigatorState() {
    window.localStorage.setItem(navigator_state_key, JSON.stringify({
        ...navigator_state,
        tables: {}
    }));
}

function getNavigatorDatabaseKey(connection_id, database_name) {
    return `${connection_id}:${database_name}`;
}

function getNavigatorGroupKey(connection_id, database_name, group_name) {
    return `${connection_id}:${database_name}:${group_name}`;
}

function getNavigatorTableKey(connection_id, database_name, table_name) {
    return `${connection_id}:${database_name}:${table_name}`;
}

function getSchemaTableKey(database_name, table_name) {
    return `${database_name}:${table_name}`;
}

function isConnectionExpanded(connection_id) {
    if (Object.prototype.hasOwnProperty.call(navigator_state.connections, connection_id)) {
        return !!navigator_state.connections[connection_id];
    }

    return connection_id == current_connection_id;
}

function setConnectionExpanded(connection_id, expanded) {
    navigator_state.connections[connection_id] = expanded;
    saveNavigatorState();
}

function isDatabaseExpanded(connection_id, database_name) {
    return !!navigator_state.databases[getNavigatorDatabaseKey(connection_id, database_name)];
}

function setDatabaseExpanded(connection_id, database_name, expanded) {
    const key = getNavigatorDatabaseKey(connection_id, database_name);
    if (expanded) {
        navigator_state.databases[key] = true;
    } else {
        delete navigator_state.databases[key];
    }
    saveNavigatorState();
}

function isSchemaGroupExpanded(connection_id, database_name, group_name) {
    const key = getNavigatorGroupKey(connection_id, database_name, group_name);
    if (Object.prototype.hasOwnProperty.call(navigator_state.groups, key)) {
        return !!navigator_state.groups[key];
    }

    return true;
}

function setSchemaGroupExpanded(connection_id, database_name, group_name, expanded) {
    const key = getNavigatorGroupKey(connection_id, database_name, group_name);
    navigator_state.groups[key] = !!expanded;
    saveNavigatorState();
}

function setAllConnectionDatabasesExpanded(connection, expanded) {
    if (!connection || schema_state.connection_id != connection.id || !schema_state.databases.length) {
        return;
    }

    for (const database_info of schema_state.databases) {
        const key = getNavigatorDatabaseKey(connection.id, database_info.database);
        if (expanded) {
            navigator_state.databases[key] = true;
        } else {
            delete navigator_state.databases[key];
        }
    }
    saveNavigatorState();
    renderNavigatorTree();

    if (expanded) {
        for (const database_info of schema_state.databases) {
            if (!schema_state.tables[database_info.database] && !schema_state.loading_tables[database_info.database]) {
                loadTables(connection.url, connection.user, connection.password, database_info.database);
            }
        }
    }
}

function isTableExpanded(connection_id, database_name, table_name) {
    return !!navigator_state.tables[getNavigatorTableKey(connection_id, database_name, table_name)];
}

function setTablesExpanded(connection_id, database_name, table_names, expanded) {
    for (const table_name of table_names) {
        const key = getNavigatorTableKey(connection_id, database_name, table_name);
        if (expanded) {
            navigator_state.tables[key] = true;
        } else {
            delete navigator_state.tables[key];
        }
    }
    saveNavigatorState();
}

function matchesSchemaFilter(database_name, filter) {
    if (!filter) {
        return true;
    }

    if (database_name.toLowerCase().includes(filter)) {
        return true;
    }

    const cached_tables = schema_state.tables[database_name] || [];
    return cached_tables.some(elem => `${database_name}.${elem.table}`.toLowerCase().includes(filter));
}

function formatConnectionSummary(connection) {
    const raw_url = (connection.url || '').trim();
    const without_protocol = raw_url.replace(/^[a-z]+:\/\//i, '').replace(/\/$/, '');
    const compact_url = without_protocol || raw_url || 'server';
    return connection.user && connection.user != 'default'
        ? `${connection.user}@${compact_url}`
        : compact_url;
}

function isMaterializedViewEngine(engine) {
    return /materialized\s+view/i.test(engine || '');
}

function isViewEngine(engine) {
    return /view/i.test(engine || '');
}

function getSchemaItemKind(engine) {
    if (isMaterializedViewEngine(engine)) {
        return 'materialized-view';
    }

    return isViewEngine(engine) ? 'view' : 'table';
}

function getSchemaItemIcon(kind) {
    switch (kind) {
        case 'materialized-view':
            return '◳';
        case 'view':
            return '◰';
        case 'table':
        default:
            return '▤';
    }
}

function getConnectionDashboardUrl(connection) {
    const raw_url = (connection?.url || '').trim();
    if (!raw_url) {
        return '';
    }

    try {
        return new URL('/dashboard', new URL(raw_url)).toString();
    } catch (e) {
        const trimmed = raw_url.replace(/\/+$/, '').replace(/\/play$/i, '');
        return trimmed ? `${trimmed}/dashboard` : '';
    }
}

function buildSelectStatement(database, table, columns) {
    if (!columns.length) {
        return `SELECT * FROM ${database}.${table} LIMIT 100;`;
    }

    const column_lines = columns.map((column, index) =>
        `    ${column.name}${index < columns.length - 1 ? ',' : ''}`);

    return `SELECT
${column_lines.join('\n')}
FROM ${database}.${table}
LIMIT 100;`;
}

function buildDropStatement(database, table, engine) {
    return `${/view/i.test(engine) ? 'DROP VIEW' : 'DROP TABLE'} ${database}.${table};`;
}

function createNavigatorLabel(icon, text, icon_class = '') {
    const label = document.createElement('span');
    label.className = 'navigator-inline-label';

    if (icon !== '')
    {
        const icon_elem = document.createElement('span');
        icon_elem.className = `navigator-node-icon ${icon_class}`.trim();
        icon_elem.innerText = icon;
        icon_elem.setAttribute('aria-hidden', 'true');
        label.appendChild(icon_elem);
    }

    const text_elem = document.createElement('span');
    text_elem.className = 'navigator-inline-text';
    text_elem.innerText = text;


    label.appendChild(text_elem);
    return label;
}

function insertTextIntoEditor(text) {
    const has_focus = document.activeElement == query_area;
    const start = query_area.selectionStart ?? query_area.value.length;
    const end = query_area.selectionEnd ?? query_area.value.length;

    if (has_focus) {
        query_area.setRangeText(text, start, end, 'end');
    } else {
        const separator = query_area.value.trim() ? '\n\n' : '';
        query_area.value += separator + text;
        query_area.selectionStart = query_area.selectionEnd = query_area.value.length;
    }

    query_area.focus();
}

function getTableQueryLogQuery(database, table) {
    return `SELECT
    event_time,
    user,
    query_duration_ms,
    read_rows,
    read_bytes,
    result_rows,
    memory_usage,
    query
FROM system.query_log
WHERE type = 'QueryFinish'
  AND (
      query ILIKE '%"${database}"."${table}"%'
      OR query ILIKE '%${database}.${table}%'
  )
ORDER BY event_time DESC
LIMIT 100`;
}

async function fetchTableColumns(server_address, user, password, database, table) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&param_database=' + encodeURIComponent(database);
    url += '&param_table=' + encodeURIComponent(table);

    let response = await fetch(url, {
        method: "POST",
        body: `SELECT name, type
            FROM system.columns
            WHERE database = {database:String} AND table = {table:String}
            ORDER BY position`,
        headers: { 'Authorization': 'never' } });
    if (!response.ok) {
        return false;
    }

    const json = await response.json();
    return json.data || [];
}

function buildInsertStatement(database, table, columns) {
    if (!columns.length) {
        return `INSERT INTO ${database}.${table}\nVALUES\n(\n    \n);`;
    }

    const column_lines = columns.map((column, index) =>
        `    ${column.name}${index < columns.length - 1 ? ',' : ''}`);
    const value_lines = columns.map((column, index) =>
        `    /* ${column.name} */${index < columns.length - 1 ? ',' : ''}`);

    return `INSERT INTO ${database}.${table}\n(\n${column_lines.join('\n')}\n)\nVALUES\n(\n${value_lines.join('\n')}\n);`;
}

function hideNavigatorContextMenu() {
    navigator_context_menu_elem.classList.remove('open');
    navigator_context_menu_elem.innerHTML = '';
}

function showNavigatorContextMenu(items, x, y) {
    navigator_context_menu_elem.innerHTML = '';

    for (const item of items) {
        const button = document.createElement('button');
        button.type = 'button';
        button.disabled = !!item.disabled;

        const icon = document.createElement('span');
        icon.className = 'navigator-menu-icon';
        icon.innerText = item.icon || '•';

        const label = document.createElement('span');
        label.className = 'navigator-menu-label';
        label.innerText = item.label;

        button.appendChild(icon);
        button.appendChild(label);
        button.addEventListener('click', e => {
            e.stopPropagation();
            hideNavigatorContextMenu();
            if (!item.disabled) {
                item.onClick();
            }
        });
        navigator_context_menu_elem.appendChild(button);
    }

    navigator_context_menu_elem.classList.add('open');
    navigator_context_menu_elem.style.left = `${x}px`;
    navigator_context_menu_elem.style.top = `${y}px`;

    const rect = navigator_context_menu_elem.getBoundingClientRect();
    const next_left = Math.min(x, Math.max(8, window.innerWidth - rect.width - 8));
    const next_top = Math.min(y, Math.max(8, window.innerHeight - rect.height - 8));
    navigator_context_menu_elem.style.left = `${next_left}px`;
    navigator_context_menu_elem.style.top = `${next_top}px`;
}

function deleteConnectionById(connection_id) {
    let connections = getSavedConnections();
    if (connections.length <= 1) {
        return;
    }

    connections = connections.filter(connection => connection.id != connection_id);
    saveConnections(connections);

    if (current_connection_id == connection_id) {
        closeConnectionEditor();
        applyConnection(connections[0]);
    } else {
        renderNavigatorTree();
    }
}

function saveConnectionRecord(nextConnection) {
    let connections = getSavedConnections();
    let updated = false;
    connections = connections.map(connection => {
        if (connection.id == nextConnection.id) {
            updated = true;
            return nextConnection;
        }
        return connection;
    });

    if (!updated) {
        connections.push(nextConnection);
    }

    saveConnections(connections);
    applyConnection(nextConnection);
}

function updateNavigatorFooter(connection = null) {
    if (!connection) {
        navigator_footer_primary_elem.innerText = 'No active connection';
        return;
    }

    navigator_footer_primary_elem.innerText = `${connection.name} · ${formatConnectionSummary(connection)}`;
    navigator_footer_primary_elem.title = `${connection.name}\n${connection.user || 'default'} @ ${connection.url || ''}`;
}

function updateActiveConnectionBanner(connection = null) {
    if (!connection) {
        active_connection_name_elem.innerText = 'No active connection';
        active_connection_meta_elem.innerText = 'Select a connection in the navigator to run queries.';
        active_connection_banner_elem.title = '';
        return;
    }

    active_connection_name_elem.innerText = connection.name || 'Connection';
    active_connection_meta_elem.innerText = formatConnectionSummary(connection);
    active_connection_banner_elem.title = `${connection.name || 'Connection'}\n${connection.user || 'default'} @ ${connection.url || ''}`;
}

function openConnectionEditor(connection = null) {
    const draft = connection ? { ...connection } : createConnection(`Connection ${getSavedConnections().length + 1}`);
    connection_editor_state = { id: draft.id };
    connection_editor_title_elem.innerText = connection ? 'Edit connection' : 'New connection';
    connection_name_input_elem.value = draft.name || '';
    connection_url_input_elem.value = draft.url || 'http://localhost:8123/';
    connection_user_input_elem.value = draft.user || 'default';
    connection_password_input_elem.value = draft.password || '';
    connection_editor_elem.classList.add('open');
    connection_name_input_elem.focus();
    connection_name_input_elem.select();
}

function closeConnectionEditor() {
    connection_editor_state = null;
    connection_editor_elem.classList.remove('open');
}

function saveConnectionEditor() {
    if (!connection_editor_state) {
        return;
    }

    const next_connection = {
        id: connection_editor_state.id,
        name: connection_name_input_elem.value.trim() || `Connection ${getSavedConnections().length + 1}`,
        url: connection_url_input_elem.value.trim() || 'http://localhost:8123/',
        user: connection_user_input_elem.value.trim() || 'default',
        password: connection_password_input_elem.value
    };

    saveConnectionRecord(next_connection);
    closeConnectionEditor();
}

function openConnectionMenu(connection, anchor_rect) {
    const dashboard_url = getConnectionDashboardUrl(connection);
    const items = [
        {
            icon: '✎',
            label: 'Edit connection',
            onClick: () => openConnectionEditor(connection)
        },
        {
            icon: '↗',
            label: 'Open dashboard',
            disabled: !dashboard_url,
            onClick: () => window.open(dashboard_url, '_blank', 'noopener')
        },
        {
            icon: '✕',
            label: 'Delete connection',
            disabled: getSavedConnections().length <= 1,
            onClick: () => deleteConnectionById(connection.id)
        }
    ];

    showNavigatorContextMenu(items, anchor_rect.left, anchor_rect.bottom + 4);
}

function openTableMenu(anchor_rect, server_address, user, password, database, table, engine) {
    const is_view = isViewEngine(engine);
    const is_materialized_view = isMaterializedViewEngine(engine);
    const items = [
        {
            icon: '≡',
            label: is_materialized_view ? 'Generate SELECT from materialized view' : is_view ? 'Generate SELECT from view' : 'Generate SELECT',
            onClick: () => insertTextIntoEditor(`SELECT * FROM ${database}.${table} LIMIT 100;`)
        },
        {
            icon: '☷',
            label: 'Generate SELECT with columns',
            onClick: async () => {
                const columns = await fetchTableColumns(server_address, user, password, database, table);
                if (columns === false) {
                    insertTextIntoEditor(`-- failed to load columns for ${database}.${table}\n`);
                    return;
                }
                insertTextIntoEditor(buildSelectStatement(database, table, columns));
            }
        },
        {
            icon: '∑',
            label: 'Generate SELECT count(*)',
            onClick: () => insertTextIntoEditor(`SELECT count(*) FROM ${database}.${table};`)
        },
        {
            icon: '⌘',
            label: 'Generate SHOW TABLE',
            onClick: () => insertTextIntoEditor(`SHOW TABLE ${database}.${table};`)
        },
        {
            icon: '◫',
            label: 'Generate system.tables lookup',
            onClick: () => insertTextIntoEditor(`SELECT * FROM system.tables WHERE database = '${database}' AND table = '${table}';`)
        },
        {
            icon: '◷',
            label: 'Generate Query log lookup',
            onClick: () => insertTextIntoEditor(getTableQueryLogQuery(database, table))
        },
        {
            icon: '✚',
            label: 'Generate INSERT',
            disabled: is_view,
            onClick: async () => {
                const columns = await fetchTableColumns(server_address, user, password, database, table);
                if (columns === false) {
                    insertTextIntoEditor(`-- failed to load columns for ${database}.${table}\n`);
                    return;
                }
                insertTextIntoEditor(buildInsertStatement(database, table, columns));
            }
        },
        {
            icon: '✕',
            label: is_materialized_view ? 'Generate DROP MATERIALIZED VIEW' : is_view ? 'Generate DROP VIEW' : 'Generate DROP TABLE',
            onClick: () => insertTextIntoEditor(buildDropStatement(database, table, engine))
        }
    ];

    showNavigatorContextMenu(items, anchor_rect.left, anchor_rect.bottom + 4);
}

function updateNavigatorActions() {
    const has_selection = !!current_connection_id;
    refresh_schema_elem.disabled = !has_selection;
}

function setSidebarCollapsed(collapsed, persist = true) {
    document.body.classList.toggle('sidebar-collapsed', collapsed);

    if (persist) {
        window.localStorage.setItem(sidebar_collapsed_key, collapsed ? '1' : '0');
    }
}

function resetSchemaBrowser(message) {
    schema_state = {
        loading: false,
        connection_id: null,
        databases: [],
        tables: {},
        columns: {},
        loading_tables: {},
        table_messages: {},
        message: message || 'No schema loaded.'
    };
    renderNavigatorTree();
}

function createNavigatorStatus(message) {
    const status = document.createElement('div');
    status.className = 'no-tables';
    status.innerText = message;
    return status;
}

function renderNavigatorTree() {
    const connections = getSavedConnections();
    const filter = schema_filter_elem.value.trim().toLowerCase();
    hideNavigatorContextMenu();
    schema_browser_elem.innerHTML = '';
    updateNavigatorActions();

    if (!connections.length) {
        schema_browser_empty_elem.style.display = 'block';
        schema_browser_empty_elem.innerText = 'No saved connections.';
        return;
    }

    for (const connection of connections) {
        const connection_matches = `${connection.name} ${connection.user} ${connection.url}`.toLowerCase().includes(filter);
        const has_matching_database = connection.id == current_connection_id
            && schema_state.databases.some(database_info => matchesSchemaFilter(database_info.database, filter));

        if (filter && !connection_matches && !has_matching_database) {
            continue;
        }

        const connection_node = document.createElement('div');
        connection_node.className = 'navigator-connection';
        if (connection.id == current_connection_id) {
            connection_node.classList.add('current');
        }

        const header = document.createElement('div');
        header.className = 'navigator-connection-header';
        header.title = `${connection.name}\n${connection.user || 'default'} @ ${connection.url || ''}`;
        header.addEventListener('contextmenu', e => {
            e.preventDefault();
            openConnectionMenu(connection, { left: e.clientX, bottom: e.clientY });
        });

        const expanded = filter && has_matching_database
            ? true
            : isConnectionExpanded(connection.id);
        if (!expanded) {
            connection_node.classList.add('collapsed');
        }

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'navigator-toggle';
        toggle.innerText = expanded ? '▾' : '▸';
        toggle.addEventListener('click', e => {
            e.stopPropagation();
            setConnectionExpanded(connection.id, !expanded);
            renderNavigatorTree();
        });

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'navigator-connection-button';
        button.appendChild(createNavigatorLabel('◎', connection.name, 'connection'));
        button.addEventListener('click', () => {
            setConnectionExpanded(connection.id, true);
            applyConnection(connection);
        });

        let current_badge = null;
        if (connection.id == current_connection_id) {
            current_badge = document.createElement('span');
            current_badge.className = 'navigator-connection-status';
            current_badge.innerText = 'Active';
        }

        const meta = document.createElement('div');
        meta.className = 'navigator-node-meta monospace';
        meta.innerText = formatConnectionSummary(connection);
        meta.title = `${connection.user || 'default'} @ ${connection.url || ''}`;

        const actions = document.createElement('div');
        actions.className = 'navigator-connection-actions';
        const can_toggle_all_databases = connection.id == schema_state.connection_id && !!schema_state.databases.length;

        const expand_all_button = document.createElement('button');
        expand_all_button.type = 'button';
        expand_all_button.className = 'navigator-connection-action';
        expand_all_button.innerText = '+';
        expand_all_button.title = can_toggle_all_databases ? 'Expand all databases' : 'Select this connection to load schema first';
        expand_all_button.disabled = !can_toggle_all_databases;
        expand_all_button.addEventListener('click', e => {
            e.stopPropagation();
            setAllConnectionDatabasesExpanded(connection, true);
        });

        const collapse_all_button = document.createElement('button');
        collapse_all_button.type = 'button';
        collapse_all_button.className = 'navigator-connection-action';
        collapse_all_button.innerText = '−';
        collapse_all_button.title = can_toggle_all_databases ? 'Collapse all databases' : 'Select this connection to load schema first';
        collapse_all_button.disabled = !can_toggle_all_databases;
        collapse_all_button.addEventListener('click', e => {
            e.stopPropagation();
            setAllConnectionDatabasesExpanded(connection, false);
        });

        const menu_button = document.createElement('button');
        menu_button.type = 'button';
        menu_button.className = 'navigator-connection-menu';
        menu_button.innerText = '⋮';
        menu_button.title = 'Connection actions';
        menu_button.addEventListener('click', e => {
            e.stopPropagation();
            const rect = menu_button.getBoundingClientRect();
            if (connection.id != current_connection_id) {
                applyConnection(connection);
            }
            openConnectionMenu(connection, rect);
        });

        actions.appendChild(expand_all_button);
        actions.appendChild(collapse_all_button);
        header.appendChild(toggle);
        header.appendChild(button);
        if (current_badge) {
            header.appendChild(current_badge);
        }
        header.appendChild(actions);
        header.appendChild(menu_button);
        connection_node.appendChild(header);
        connection_node.appendChild(meta);

        const children = document.createElement('div');
        children.className = 'navigator-connection-children';

        if (expanded && connection.id == current_connection_id) {
            if (schema_state.loading && schema_state.connection_id == connection.id) {
                children.appendChild(createNavigatorStatus('Loading schema...'));
            } else if (schema_state.connection_id == connection.id && schema_state.databases.length) {
                const visible_databases = schema_state.databases.filter(database_info =>
                    matchesSchemaFilter(database_info.database, filter));

                for (const database_info of visible_databases) {
                    let database = document.createElement('div');
                    database.className = 'database';
                    const database_expanded = filter
                        ? true
                        : isDatabaseExpanded(connection.id, database_info.database);
                    if (!database_expanded) {
                        database.classList.add('collapsed');
                    }

                    let database_header = document.createElement('div');
                    database_header.className = 'database-header';

                    let database_toggle = document.createElement('button');
                    database_toggle.type = 'button';
                    database_toggle.className = 'navigator-toggle';
                    database_toggle.innerText = database_expanded ? '▾' : '▸';

                    let database_link = document.createElement('button');
                    database_link.type = 'button';
                    database_link.className = 'database-button';
                    if (database_info.current) database_link.classList.add('current');
                    database_link.appendChild(createNavigatorLabel('🛢️', database_info.database, 'database'));

                    const database_actions = document.createElement('div');
                    database_actions.className = 'navigator-header-actions';

                    const expand_database_button = document.createElement('button');
                    expand_database_button.type = 'button';
                    expand_database_button.className = 'navigator-header-action';
                    expand_database_button.innerText = '+';
                    expand_database_button.title = 'Expand all tables and views in this database';

                    const collapse_database_button = document.createElement('button');
                    collapse_database_button.type = 'button';
                    collapse_database_button.className = 'navigator-header-action';
                    collapse_database_button.innerText = '−';
                    collapse_database_button.title = 'Collapse all tables and views in this database';

                    const toggle_database_tables = async expanded => {
                        let database_rows = schema_state.tables[database_info.database];
                        if (!database_rows && !schema_state.loading_tables[database_info.database]) {
                            database_rows = await loadTables(connection.url, connection.user, connection.password, database_info.database);
                        }
                        if (!database_rows || database_rows === false) {
                            return;
                        }

                        setTablesExpanded(connection.id, database_info.database, database_rows.map(row => row.table), expanded);
                        renderNavigatorTree();
                    };

                    expand_database_button.addEventListener('click', async e => {
                        e.stopPropagation();
                        await toggle_database_tables(true);
                    });
                    collapse_database_button.addEventListener('click', async e => {
                        e.stopPropagation();
                        await toggle_database_tables(false);
                    });

                    database_actions.appendChild(expand_database_button);
                    database_actions.appendChild(collapse_database_button);

                    let tables = document.createElement('div');
                    tables.className = 'tables';

                    database_header.appendChild(database_toggle);
                    database_header.appendChild(database_link);
                    database_header.appendChild(database_actions);
                    database.appendChild(database_header);
                    database.appendChild(tables);
                    children.appendChild(database);

                    const toggle_database = () => {
                        const next_expanded = !isDatabaseExpanded(connection.id, database_info.database);
                        setDatabaseExpanded(connection.id, database_info.database, next_expanded);
                        renderNavigatorTree();
                        if (next_expanded
                            && !schema_state.tables[database_info.database]
                            && !schema_state.loading_tables[database_info.database]) {
                            loadTables(connection.url, connection.user, connection.password, database_info.database);
                        }
                    };

                    database_toggle.addEventListener('click', e => {
                        e.stopPropagation();
                        toggle_database();
                    });
                    database_link.addEventListener('click', e => {
                        e.stopPropagation();
                        toggle_database();
                    });

                    if (database_expanded) {
                        if (schema_state.loading_tables[database_info.database]) {
                            tables.appendChild(createNavigatorStatus('Loading tables...'));
                        } else if (schema_state.table_messages[database_info.database]) {
                            tables.appendChild(createNavigatorStatus(schema_state.table_messages[database_info.database]));
                        } else if (schema_state.tables[database_info.database]) {
                            renderTableGroups(connection.id, connection.url, connection.user, connection.password, database_info.database, tables, schema_state.tables[database_info.database]);
                        } else {
                            tables.appendChild(createNavigatorStatus('Loading tables...'));
                            loadTables(connection.url, connection.user, connection.password, database_info.database);
                        }
                    }
                }
                if (!visible_databases.length) {
                    children.appendChild(createNavigatorStatus('No databases matched the current filter.'));
                }
            } else if (schema_state.message) {
                children.appendChild(createNavigatorStatus(schema_state.message));
            }
        } else if (expanded) {
            children.appendChild(createNavigatorStatus('Select this connection to load schema.'));
        }

        connection_node.appendChild(children);
        schema_browser_elem.appendChild(connection_node);
    }

    schema_browser_empty_elem.style.display = schema_browser_elem.firstChild ? 'none' : 'block';
    if (!schema_browser_elem.firstChild) {
        schema_browser_empty_elem.innerText = schema_state.message || 'No navigator items.';
    }
}

function renderTableGroups(connection_id, server_address, user, password, database, tables_elem, table_rows) {
    while (tables_elem.firstChild) tables_elem.removeChild(tables_elem.firstChild);

    const filter = schema_filter_elem.value.trim().toLowerCase();

    const sorted_rows = [...table_rows].sort((a, b) => a.table.localeCompare(b.table, undefined, { numeric: true }));
    const groups = [
        { name: 'Tables', kind: 'table', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'table') },
        { name: 'Materialized Views', kind: 'materialized-view', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'materialized-view') },
        { name: 'Views', kind: 'view', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'view') }
    ];

    for (const group of groups) {
        const filtered_tables = group.rows.filter(elem => !filter || `${database}.${elem.table}`.toLowerCase().includes(filter));
        if (!filtered_tables.length) {
            continue;
        }

        let group_elem = document.createElement('div');
        group_elem.className = 'schema-group';

        const group_expanded = filter ? true : isSchemaGroupExpanded(connection_id, database, group.name);
        if (!group_expanded) {
            group_elem.classList.add('collapsed');
        }

        let group_title = document.createElement('div');
        group_title.className = 'schema-group-title';
        const group_toggle = document.createElement('span');
        group_toggle.className = 'schema-group-toggle';
        group_toggle.innerText = group_expanded ? '▾' : '▸';

        const group_label = createNavigatorLabel(getSchemaItemIcon(group.kind), group.name, group.kind);
        const group_count = document.createElement('span');
        group_count.className = 'schema-group-count';
        group_count.innerText = String(filtered_tables.length);

        group_title.appendChild(group_toggle);
        group_title.appendChild(group_label);
        group_title.addEventListener('click', () => {
            setSchemaGroupExpanded(connection_id, database, group.name, !group_expanded);
            renderNavigatorTree();
        });
        group_title.appendChild(group_count);
        group_elem.appendChild(group_title);

        const group_items = document.createElement('div');
        group_items.className = 'schema-group-items';

        for (let elem of filtered_tables) {
            let table = document.createElement('div');
            table.className = 'table';
            const item_kind = getSchemaItemKind(elem.engine);

            let table_row = document.createElement('div');
            table_row.className = 'table-row';
            table_row.addEventListener('contextmenu', e => {
                e.preventDefault();
                openTableMenu({ left: e.clientX, bottom: e.clientY }, server_address, user, password, database, elem.table, elem.engine);
            });

            let toggle = document.createElement('button');
            toggle.type = 'button';
            toggle.className = 'table-toggle';
            const table_expanded = isTableExpanded(connection_id, database, elem.table);
            toggle.innerText = table_expanded ? '▾' : '▸';

            let table_main = document.createElement('div');
            table_main.className = 'table-main';

            let table_link = document.createElement('button');
            table_link.type = 'button';
            table_link.className = 'table-link';
            table_link.appendChild(createNavigatorLabel('', elem.table, item_kind));

            let table_meta = document.createElement('span');
            table_meta.className = 'table-meta monospace';
            table_meta.title = `${elem.engine}${+elem.total_rows ? ` • ${formatReadableRows(elem.total_rows)} rows` : ''}${+elem.total_bytes ? ` • ${formatReadableBytes(elem.total_bytes)}` : ''}`;
            table_meta.textContent = elem.engine;

            let table_menu_button = document.createElement('button');
            table_menu_button.type = 'button';
            table_menu_button.className = 'table-menu';
            table_menu_button.innerText = '⋯';
            table_menu_button.title = 'Table actions';
            table_menu_button.addEventListener('click', e => {
                e.stopPropagation();
                const rect = table_menu_button.getBoundingClientRect();
                openTableMenu(rect, server_address, user, password, database, elem.table, elem.engine);
            });

            const columns = document.createElement('div');
            columns.className = table_expanded ? 'columns open' : 'columns';

            const toggle_columns = async e => {
                e?.stopPropagation();
                const will_open = !columns.classList.contains('open');
                setTablesExpanded(connection_id, database, [elem.table], will_open);
                columns.classList.toggle('open', will_open);
                toggle.innerText = will_open ? '▾' : '▸';
                if (will_open) {
                    await loadColumns(server_address, user, password, database, elem.table, columns);
                }
            };

            toggle.addEventListener('click', toggle_columns);

            table_main.appendChild(table_link);
            table_main.appendChild(table_meta);
            table_main.appendChild(table_menu_button);
            table_row.appendChild(toggle);
            table_row.appendChild(table_main);
            table.appendChild(table_row);
            table.appendChild(columns);
            table_link.addEventListener('click', toggle_columns);
            if (table_expanded) {
                void loadColumns(server_address, user, password, database, elem.table, columns);
            }
            group_items.appendChild(table);
        }

        group_elem.appendChild(group_items);
        tables_elem.appendChild(group_elem);
    }

    if (!tables_elem.firstChild) {
        let table = document.createElement('div');
        table.className = 'no-tables';
        table.append('no tables');
        tables_elem.append(table);
    }
}

async function getServerStatus(server_address, user, password) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSONEachRow';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    try {
        let response = await fetch(url, { method: "POST", body: "SELECT version() AS v, uptime() AS t", headers: { 'Authorization': 'never' } });
        if (!response.ok) return false;
        json = await response.json();
        return json;
    } catch (e) {
        return false;
    }
}

let load_databases_request_num = 0;
async function loadDatabases(server_address, user, password) {
    ++load_databases_request_num;
    const current_load_databases_request_num = load_databases_request_num;
    const target_connection_id = current_connection_id;
    schema_state = {
        loading: true,
        connection_id: target_connection_id,
        databases: [],
        tables: {},
        columns: {},
        loading_tables: {},
        table_messages: {},
        message: 'Loading schema...'
    };
    renderNavigatorTree();

    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);

    let response = await fetch(url, {
        method: "POST",
        body: `SELECT database, database = currentDatabase() AS current
            FROM system.databases WHERE database != 'INFORMATION_SCHEMA'
            ORDER BY
                database = 'information_schema',
                database = 'system',
                database != 'default',
                database`,
        headers: { 'Authorization': 'never' } });
    if (!response.ok) {
        schema_state = {
            loading: false,
            connection_id: target_connection_id,
            databases: [],
            tables: {},
            columns: {},
            loading_tables: {},
            table_messages: {},
            message: 'Failed to load schema.'
        };
        renderNavigatorTree();
        return false;
    }
    json = await response.json();

    if (current_load_databases_request_num != load_databases_request_num) return false;
    if (target_connection_id != current_connection_id) return false;

    // Use natural order for database names
    json.data.sort((a, b) => {
        // Maintain original order for default, system, information_schema
        const getPriority = (name) => {
            switch (name) {
                case 'default': return 0;
                case 'system': return 2;
                case 'information_schema': return 3
                default: return 1;
            }
        }

        return getPriority(a.database) - getPriority(b.database)
            || a.database.localeCompare(b.database, undefined, { numeric: true });
    });

    schema_state = {
        loading: false,
        connection_id: target_connection_id,
        databases: json.data,
        tables: {},
        columns: {},
        loading_tables: {},
        table_messages: {},
        message: json.data.length ? '' : 'No databases found.'
    };
    renderNavigatorTree();
}

async function loadTables(server_address, user, password, database) {
    schema_state.loading_tables[database] = true;
    delete schema_state.table_messages[database];
    renderNavigatorTree();

    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&param_database=' + encodeURIComponent(database);

    let response = await fetch(url, {
        method: "POST",
        body: `SELECT table, engine, total_rows, total_bytes FROM system.tables WHERE database = {database:String}
            ORDER BY table LIKE '.inner%', table`,
        headers: { 'Authorization': 'never' } });
    if (!response.ok) {
        delete schema_state.loading_tables[database];
        schema_state.table_messages[database] = 'Failed to load tables.';
        renderNavigatorTree();
        return false;
    }
    json = await response.json();

    if (schema_state.connection_id != current_connection_id) return false;

    delete schema_state.loading_tables[database];
    delete schema_state.table_messages[database];
    schema_state.tables[database] = json.data;
    renderNavigatorTree();
    return json.data;
}

async function loadColumns(server_address, user, password, database, table, container) {
    ++load_columns_request_num;
    const current_load_columns_request_num = load_columns_request_num;
    const cache_key = getSchemaTableKey(database, table);

    if (schema_state.columns[cache_key]) {
        renderColumns(container, schema_state.columns[cache_key]);
        return schema_state.columns[cache_key];
    }

    container.innerHTML = 'loading columns...';

    const columns = await fetchTableColumns(server_address, user, password, database, table);
    if (columns === false) {
        container.innerText = 'failed to load columns';
        return false;
    }
    if (current_load_columns_request_num != load_columns_request_num) return false;

    schema_state.columns[cache_key] = columns;
    renderColumns(container, columns);
    return columns;
}

function appendSidebarResizer() {
    let drag_state = {
        is_dragging: false,
        offset_x: null,
        offset_width: null,
        current_width: null
    };

    const start = (e) => {
        if (e.button !== 0 || document.body.classList.contains('sidebar-collapsed')) {
            return;
        }

        drag_state.offset_x = e.clientX;
        drag_state.offset_width = menu_elem.getBoundingClientRect().width;
        drag_state.current_width = drag_state.offset_width;
        drag_state.is_dragging = true;
        document.body.classList.add('sidebar-resizing');

        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
        document.addEventListener('pointercancel', stop);
    };

    const move = (e) => {
        if (!drag_state.is_dragging) {
            return;
        }

        drag_state.current_width = drag_state.offset_width + (e.clientX - drag_state.offset_x);
        setSidebarWidth(drag_state.current_width, false);
    };

    const stop = () => {
        if (!drag_state.is_dragging) {
            return;
        }

        drag_state.is_dragging = false;
        document.body.classList.remove('sidebar-resizing');
        setSidebarWidth(drag_state.current_width, true);

        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', stop);
        document.removeEventListener('pointercancel', stop);
    };

    sidebar_resizer_elem.addEventListener('pointerdown', start);
    sidebar_resizer_elem.addEventListener('touchstart', (e) => e.preventDefault());
}

function formatUptime(t) {
    if (t < 60) { return t + " sec" }
    if (t < 3600) { return Number(t / 60).toFixed() + " min" }
    if (t < 86400) { return Number(t / 3600).toFixed() + " hr" }
    const days = Number(t / 86400).toFixed();
    return days + " day" + (days > 1 ? 's' : '');
}

function queryToColor(str) {
    let hash = 2166136261;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }

    /// Limited range to avoid violet colors.
    return 50 + ((hash >>> 0) % 200);
}

function toBase64(str) {
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    const binary = Array.from(bytes, byte => String.fromCharCode(byte)).join('');
    return btoa(binary);
}

function fromBase64(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
    const decoder = new TextDecoder();
    return decoder.decode(bytes);
}
